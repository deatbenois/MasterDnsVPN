name: Docker GHCR (Buildx Multi-Arch)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to download artifacts from (e.g. latest or v1.2.3)"
        required: false
        default: "latest"
      image_tag:
        description: "Docker image tag"
        required: false
        default: "latest"
      release_sha256:
        description: "Optional SHA256 of release zip for verification"
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "docker/**"
      - ".github/workflows/docker-ghcr.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/masterking32/masterdnsvpn
  PLATFORMS: linux/amd64,linux/arm/v5,linux/arm/v7,linux/arm64/v8,linux/mips64le

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        env:
          REGISTRY_KIND: ghcr
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || 'latest' }}
          RELEASE_SHA256: ${{ github.event.inputs.release_sha256 || '' }}
          IMAGE_REFS: masterking32/masterdnsvpn:${{ github.event.inputs.image_tag || 'latest' }}
          PLATFORMS: ${{ env.PLATFORMS }}
        run: |
          chmod +x docker/buildx-multi-platform.sh
          docker/buildx-multi-platform.sh
